name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Use `npm install` (not `npm ci`) so a lockfile produced by a newer
      # local npm doesn't break the CI runner's npm strict sync check.
      - run: npm install --no-audit --no-fund

      - run: npm run test

      - name: Build
        env:
          # Public Supabase values are safe to expose to the browser.
          # Configure these as repository secrets/variables.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Served at myst-tech.com/ai-faculty-assistant/ -> base is fixed.
          VITE_BASE_PATH: /ai-faculty-assistant/
        run: npm run build

      # Assemble the published site. When VITE_BASE_PATH is a subpath
      # (e.g. /ai-faculty-assistant/) the built files are nested under that
      # folder so a custom-domain apex site can serve the app at the subpath.
      # A root redirect + SPA 404 fallback are added too.
      - name: Assemble site (subpath + SPA fallback)
        env:
          BASE: /ai-faculty-assistant/
        run: |
          set -e
          SUB="ai-faculty-assistant"
          mkdir -p "site/$SUB"
          cp -r dist/. "site/$SUB/"
          cp "site/$SUB/index.html" "site/$SUB/404.html"
          cp "site/$SUB/index.html" site/404.html
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=%s">' "$BASE" > site/index.html
          echo "Published structure:" && ls -R site | head -50

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
