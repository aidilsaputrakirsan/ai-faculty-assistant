<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>AI Faculty Assistant</title>
    <script>
      // GitHub Pages SPA fallback.
      // When served from a project page the app lives under /<repo>/, so we
      // keep the first path segment. For a user/custom-domain page set
      // pathSegmentsToKeep = 0.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      sessionStorage.redirect = l.href;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/'
      );
    </script>
  </head>
  <body></body>
</html>
